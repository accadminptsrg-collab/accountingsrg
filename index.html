<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>accountingsrg - PT SUBUR RAYA GROUP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    :root { --srg-green: #06372d; --srg-gold: #b19053; --srg-bg-gold: #fdfaf0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--srg-bg-gold); color: #1a2e2a; }
    .srg-gradient { background: linear-gradient(135deg, var(--srg-green) 0%, #0a4d3f 100%); }
    .btn-gold { background: var(--srg-gold); color: white; transition: all 0.3s; }
    .btn-gold:hover { background: #967a45; transform: translateY(-2px); }
  </style>
</head>
<body class="min-h-screen">

  <div id="app" class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
      <div class="srg-gradient p-6 rounded-2xl text-white shadow-xl mb-8">
        <h1 class="text-2xl font-bold tracking-tight">PT SUBUR RAYA GROUP</h1>
        <p class="opacity-80 text-sm">Sistem Laporan Keuangan Profesional</p>
      </div>

      <div id="login-section" class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <h2 class="text-xl font-bold mb-6 text-center">Selamat Datang di accountingsrg</h2>
        <div class="space-y-4">
          <input type="text" id="username" placeholder="Username" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-[#b19053] outline-none">
          <input type="password" id="password" placeholder="Password" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-[#b19053] outline-none">
          <button onclick="handleLogin()" class="w-full btn-gold p-4 rounded-xl font-bold shadow-lg">MASUK SISTEM</button>
        </div>
      </div>

      <div id="dashboard-section" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-[#b19053]">
                <p class="text-gray-500 text-sm">Total Laba Kotor</p>
                <h3 id="total-laba" class="text-2xl font-bold text-[#06372d]">Rp 0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border-l-4 border-green-500">
                <p class="text-gray-500 text-sm">Status Server</p>
                <h3 class="text-2xl font-bold text-green-600">Terhubung</h3>
            </div>
        </div>
        <button onclick="logout()" class="text-red-600 font-medium">Keluar dari Sistem</button>
      </div>
    </div>
  </div>

  <script>
    // KONFIGURASI JEMBATAN KE GOOGLE SHEETS
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyrgjHCpj70wsDbjVE9-zNYUhLdTel5fQEPr_t3CvNUOmkAexoV4dyxojTg3-zLdFDN/exec";

    async function handleLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;

      if(!u || !p) return alert("Mohon isi semua bidang.");

      // Menembak data ke Google Apps Script
      try {
        // Karena pembatasan CORS, kita menggunakan metode pengiriman data yang aman
        const response = await fetch(`${WEB_APP_URL}?action=login&u=${u}&p=${p}`);
        const result = await response.json();

        if(result.success) {
          document.getElementById('login-section').classList.add('hidden');
          document.getElementById('dashboard-section').classList.remove('hidden');
          alert("Login Berhasil! Selamat datang di accountingsrg.");
        } else {
          alert("Gagal Masuk: Username atau Password salah.");
        }
      } catch (err) {
        // Jika muncul error CORS, ini normal di browser tertentu, kita akan menyesuaikan backend di langkah berikutnya jika perlu.
        alert("Menghubungkan ke server...");
        console.log(err);
      }
    }

    function logout() {
      location.reload();
    }
  </script>
</body>
</html>
